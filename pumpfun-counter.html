<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>Pump.fun Counter</title>
		<meta name="description" content="Pump.fun new token counter widget." />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="description" content="Pump.fun live feed widget." />
		<meta name="robots" content="noindex" />
		<style>
			* { margin: 0; padding: 0; box-sizing: border-box; }
			body {
				background: #0a0a0a;
				color: #00ff41;
				font-family: 'Courier New', monospace;
				font-size: 24px;
				font-weight: bold;
				display: flex;
				align-items: center;
				justify-content: center;
				height: 100vh;
				text-align: center;
			}
		</style>
	</head>
	<body>
		<div id="counter">0</div>
		<script type="module">
			import pumpFunClient from './src/pumpfun-client.js';

			let count = 0;
			const counterElement = document.getElementById('counter');

			pumpFunClient.addEventListener('token', () => {
				count++;
				counterElement.innerText = count;
			});
		</script>
	</body>
</html>
