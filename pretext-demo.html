<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>three.ws — Give Your AI a Body</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #ffd76a;
      --gold-dim: rgba(255,215,106,0.55);
      --bg: #07080f;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: rgba(255,255,255,0.72);
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    /* ── header ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem clamp(1rem, 4vw, 2.5rem);
      background: linear-gradient(to bottom, rgba(7,8,15,0.82) 0%, transparent 100%);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .logo {
      font-family: 'Space Grotesk', 'Inter', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 0.45rem;
      text-decoration: none;
    }

    .logo-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), #ff8f4d);
      box-shadow: 0 0 12px rgba(255,143,77,0.6);
    }

    .nav-links {
      display: flex;
      gap: 1.5rem;
      align-items: center;
      list-style: none;
    }

    .nav-links a {
      font-size: 0.85rem;
      font-weight: 500;
      color: rgba(255,255,255,0.55);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: #fff; }

    .nav-cta {
      background: linear-gradient(135deg, var(--gold), #ff8f4d) !important;
      color: #000 !important;
      padding: 0.45rem 1rem;
      border-radius: 6px;
      font-weight: 600 !important;
    }

    /* ── scene ── */
    #scene {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }

    /* background glows */
    .glow-a {
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,175,60,0.06) 0%, transparent 70%);
      top: -100px; left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
    }
    .glow-b {
      position: absolute;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(120,80,220,0.07) 0%, transparent 70%);
      bottom: 10%; right: 10%;
      pointer-events: none;
    }
    .glow-c {
      position: absolute;
      width: 300px; height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(60,180,220,0.06) 0%, transparent 70%);
      bottom: 5%; left: 8%;
      pointer-events: none;
    }

    /* ── 3D model — centered, tall ── */
    #mv-wrap {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      /* size set by JS on resize */
      pointer-events: none;
      z-index: 5;
    }

    model-viewer {
      display: block;
      width: 100%;
      height: 100%;
      background: transparent;
      --progress-bar-color: transparent;
      --progress-mask: transparent;
    }

    /* model glow ring */
    #mv-glow {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(ellipse at 50% 80%, rgba(255,175,60,0.12) 0%, transparent 65%);
      pointer-events: none;
      z-index: 4;
    }

    /* ── pretext text stage ── */
    #text-stage {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 6;
      pointer-events: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .txt-line {
      position: absolute;
      white-space: pre;
      font-family: 'Inter', sans-serif;
      color: rgba(255,255,255,0.55);
      pointer-events: none;
      line-height: 1;
    }

    .txt-hl {
      position: absolute;
      white-space: pre;
      font-family: 'Space Grotesk', 'Inter', sans-serif;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
      pointer-events: none;
      line-height: 1;
    }

    .txt-eyebrow {
      position: absolute;
      white-space: pre;
      font-family: 'Space Grotesk', 'Inter', sans-serif;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      pointer-events: none;
    }

    .txt-accent {
      position: absolute;
      white-space: pre;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      color: rgba(255,215,106,0.5);
      font-style: italic;
      pointer-events: none;
    }

    /* ── orbs ── */
    .orb {
      position: absolute;
      border-radius: 50%;
      z-index: 3;
      will-change: transform;
      pointer-events: auto;
      cursor: grab;
    }

    /* ── bottom badge ── */
    .bottom-badge {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      padding: 0.4rem 0.9rem;
      border-radius: 999px;
      font-size: 0.72rem;
      color: rgba(255,255,255,0.35);
      font-family: 'Space Grotesk', 'Inter', sans-serif;
      pointer-events: none;
      white-space: nowrap;
    }

    .bottom-badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 6px rgba(255,215,106,0.8);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.5; transform: scale(0.75); }
    }

    #err {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: #c0392b;
      color: #fff;
      font: 13px monospace;
      padding: 12px;
      z-index: 9999;
      white-space: pre-wrap;
      display: none;
    }
  </style>
</head>
<body>

<div id="err"></div>

<!-- header -->
<header>
  <a class="logo" href="#">
    <span class="logo-dot"></span>
    three.ws
  </a>
  <nav>
    <ul class="nav-links">
      <li><a href="#">Docs</a></li>
      <li><a href="#">Agents</a></li>
      <li><a href="#">On-chain</a></li>
      <li><a href="#" class="nav-cta">Build free →</a></li>
    </ul>
  </nav>
</header>

<!-- scene -->
<div id="scene">
  <div class="glow-a"></div>
  <div class="glow-b"></div>
  <div class="glow-c"></div>
  <div id="mv-wrap">
    <model-viewer
      id="mv"
      src="/animations/robotexpressive.glb"
      auto-rotate
      auto-rotate-delay="0"
      rotation-per-second="8deg"
      interaction-prompt="none"
      camera-controls="false"
      disable-zoom
      shadow-intensity="0.4"
      exposure="0.9"
      environment-image="neutral"
      camera-orbit="0deg 82deg 3.2m"
      field-of-view="38deg"
    ></model-viewer>
    <div id="mv-glow"></div>
  </div>
  <div id="text-stage"></div>
</div>

<div class="bottom-badge">
  <div class="bottom-badge-dot"></div>
  pretext · zero DOM reads · text flows around your agent in real time
</div>

<script type="module">
  function showErr(e) {
    const el = document.getElementById('err');
    el.style.display = 'block';
    el.textContent = String(e?.stack || e);
    console.error(e);
  }
  window.addEventListener('unhandledrejection', e => showErr(e.reason));

  import('@chenglou/pretext').then(lib => {
    try { main(lib); } catch(e) { showErr(e); }
  }).catch(showErr);

  function main({ prepareWithSegments, layoutNextLine, layoutWithLines, walkLineRanges }) {

    // ── copy ──────────────────────────────────────────────────────────────
    const EYEBROW   = 'THE 3D LAYER FOR ONCHAIN AI AGENTS';
    const HL_LINE1  = 'Give your';
    const HL_LINE2  = 'AI a body.';
    const BODY_TEXT = `Born in 3D. Raised on-chain. Yours forever.

Your AI has been a chatbox long enough. Give it a body, a personality, and a permanent home open to every human, app, and agent that comes looking.

Drop any GLB into the browser and your agent appears as a fully rendered 3D avatar — animated, reactive, and ready to embed anywhere you can drop a script tag.

Connect any LLM via MCP or A2A — Claude, GPT, Gemini, or your own. Built-in empathy layer for real-time emotion. No SDK on the consumer side. No vendor lock-in.

Register your agent on 20+ EVM chains via ERC-8004 — a verifiable, CREATE2-deterministic identity discoverable by any A2A or MCP client. Your agent. Your keys.

The interface is not the chatbox. The interface is the agent itself, rendered in three dimensions, moving through a persistent space, leaving a trail of actions a supervisor can audit.

Autonomous agents on Solana act at four hundred milliseconds finality. They swap tokens, manage liquidity, respond to on-chain events — all without human latency in the loop. The 3D body is the signal layer. You watch. You decide when to step in.

This is the final interface. Not a dashboard. Not a feed. A world where your agents live, move, and work — visible, auditable, yours.`;

    const ACCENT_LINES = [
      'glTF 2.0 · GLB · ERC-8004 · A2A · MCP',
      'Solana · EVM · 20+ chains',
    ];

    // ── fonts ──────────────────────────────────────────────────────────────
    const BODY_FONT = '15px "Inter", sans-serif';
    const BODY_LH   = 25;
    const HL_FAMILY = '"Space Grotesk", "Inter", sans-serif';
    const EY_FONT   = `600 11px ${HL_FAMILY}`;
    const AC_FONT   = `300 13px "Inter", sans-serif`;

    // ── DOM ────────────────────────────────────────────────────────────────
    const mv      = document.getElementById('mv');
    const mvWrap  = document.getElementById('mv-wrap');
    const stage   = document.getElementById('text-stage');

    // ── model viewer sizing ────────────────────────────────────────────────
    function sizeModel() {
      const W = window.innerWidth, H = window.innerHeight;
      const mh = Math.round(H * 0.78);
      const mw = Math.round(Math.min(mh * 0.58, W * 0.38));
      mvWrap.style.width  = mw + 'px';
      mvWrap.style.height = mh + 'px';
    }
    sizeModel();
    window.addEventListener('resize', sizeModel);

    // ── orbs ───────────────────────────────────────────────────────────────
    const ORB_DEFS = [
      { fx: 0.10, fy: 0.20, r: 55,  vx: 18,  vy: 12,  rgb: [255,175,60]  },
      { fx: 0.85, fy: 0.25, r: 45,  vx: -15, vy: 20,  rgb: [100,130,255] },
      { fx: 0.12, fy: 0.70, r: 50,  vx: 20,  vy: -14, rgb: [160,80,220]  },
      { fx: 0.88, fy: 0.72, r: 40,  vx: -18, vy: -16, rgb: [60,200,180]  },
    ];

    const scene = document.getElementById('scene');
    const orbEls = ORB_DEFS.map(d => {
      const el = document.createElement('div');
      el.className = 'orb';
      const [r,g,b] = d.rgb;
      el.style.background = `radial-gradient(circle at 35% 35%, rgba(${r},${g},${b},0.28), rgba(${r},${g},${b},0.08) 55%, transparent 72%)`;
      el.style.boxShadow   = `0 0 40px 10px rgba(${r},${g},${b},0.14), 0 0 90px 30px rgba(${r},${g},${b},0.05)`;
      scene.appendChild(el);
      return el;
    });

    const orbs = ORB_DEFS.map(d => ({
      x: d.fx * window.innerWidth,
      y: d.fy * window.innerHeight,
      r: d.r, vx: d.vx, vy: d.vy, paused: false,
    }));

    // ── drag ───────────────────────────────────────────────────────────────
    let drag = null, pMove = null, pDown = null;

    scene.addEventListener('pointerdown', e => {
      const hit = hitOrb(e.clientX, e.clientY);
      if (hit < 0) return;
      drag = { i: hit, ox: orbs[hit].x, oy: orbs[hit].y, px: e.clientX, py: e.clientY };
      orbs[hit].paused = true;
      e.preventDefault();
    });
    window.addEventListener('pointermove', e => { pMove = { x: e.clientX, y: e.clientY }; });
    window.addEventListener('pointerup', e => {
      if (!drag) return;
      orbs[drag.i].paused = false;
      orbs[drag.i].vx = (e.clientX - drag.px) * 4;
      orbs[drag.i].vy = (e.clientY - drag.py) * 4;
      drag = null;
    });

    function hitOrb(px, py) {
      for (let i = orbs.length - 1; i >= 0; i--) {
        const o = orbs[i];
        const dx = px - o.x, dy = py - o.y;
        if (dx*dx + dy*dy <= o.r * o.r * 1.2) return i;
      }
      return -1;
    }

    // ── layout helpers ─────────────────────────────────────────────────────
    const MIN_SLOT = 40;

    function carveSlots(base, blocked) {
      let slots = [base];
      for (const b of blocked) {
        const next = [];
        for (const s of slots) {
          if (b.right <= s.left || b.left >= s.right) { next.push(s); continue; }
          if (b.left  > s.left)  next.push({ left: s.left,  right: b.left  });
          if (b.right < s.right) next.push({ left: b.right, right: s.right });
        }
        slots = next;
      }
      return slots.filter(s => s.right - s.left >= MIN_SLOT);
    }

    // ── column layout ──────────────────────────────────────────────────────
    function layoutCol(prepared, startCursor, rX, rY, rW, rH, lh, circObs, rectObs) {
      let cursor = startCursor, y = rY;
      const lines = [];
      let done = false;
      while (y + lh <= rY + rH && !done) {
        const blocked = [];
        for (const o of circObs) {
          const t = y, b = y + lh, vp = 4, hp = 10;
          const cy = o.cy, cx = o.cx, r = o.r;
          const top = t - vp, bot = b + vp;
          if (top >= cy + r || bot <= cy - r) continue;
          const minDy = cy >= top && cy <= bot ? 0 : cy < top ? top - cy : cy - bot;
          if (minDy >= r) continue;
          const dx = Math.sqrt(r*r - minDy*minDy);
          blocked.push({ left: cx - dx - hp, right: cx + dx + hp });
        }
        for (const rect of rectObs) {
          if (y + lh <= rect.y || y >= rect.y + rect.h) continue;
          blocked.push({ left: rect.x, right: rect.x + rect.w });
        }
        const slots = carveSlots({ left: rX, right: rX + rW }, blocked);
        if (!slots.length) { y += lh; continue; }
        for (const slot of slots.sort((a, b) => a.left - b.left)) {
          const ln = layoutNextLine(prepared, cursor, slot.right - slot.left);
          if (!ln) { done = true; break; }
          lines.push({ x: Math.round(slot.left), y: Math.round(y), text: ln.text });
          cursor = ln.end;
        }
        y += lh;
      }
      return { lines, cursor };
    }

    // ── pools ──────────────────────────────────────────────────────────────
    const pools = { body: [], hl: [], ey: [], ac: [] };

    function sync(pool, n, tag, cls) {
      while (pool.length < n) {
        const el = document.createElement(tag);
        el.className = cls;
        stage.appendChild(el);
        pool.push(el);
      }
      for (let i = 0; i < pool.length; i++) pool[i].style.display = i < n ? '' : 'none';
    }

    function applyLines(pool, lines, font, lh) {
      for (let i = 0; i < lines.length; i++) {
        const el = pool[i], ln = lines[i];
        el.textContent = ln.text;
        el.style.left = ln.x + 'px';
        el.style.top  = ln.y + 'px';
        el.style.font = font;
        el.style.lineHeight = lh + 'px';
      }
    }

    // ── pretext prepare ────────────────────────────────────────────────────
    const prepBody  = prepareWithSegments(BODY_TEXT, BODY_FONT);
    const prepEy    = prepareWithSegments(EYEBROW, EY_FONT);
    const prepAc    = ACCENT_LINES.map(t => prepareWithSegments(t, AC_FONT));

    // ── headline fit (two fixed lines, find largest px that fits left col) ─
    let hlCache2 = null;
    function fitHL2(maxW, maxPx) {
      const key = `${maxW}|${maxPx}`;
      if (hlCache2?.key === key) return hlCache2;
      let lo = 20, hi = maxPx, best = lo;
      while (lo <= hi) {
        const sz = (lo + hi) >> 1;
        const font = `700 ${sz}px ${HL_FAMILY}`;
        const p1 = prepareWithSegments(HL_LINE1, font);
        const p2 = prepareWithSegments(HL_LINE2, font);
        let fits = true;
        walkLineRanges(p1, maxW, ln => { if (ln.end.graphemeIndex !== 0) fits = false; });
        walkLineRanges(p2, maxW, ln => { if (ln.end.graphemeIndex !== 0) fits = false; });
        if (fits) { best = sz; lo = sz + 1; } else { hi = sz - 1; }
      }
      const lh = Math.round(best * 1.08);
      hlCache2 = { key, sz: best, lh, font: `700 ${best}px ${HL_FAMILY}` };
      return hlCache2;
    }

    // ── frame loop ─────────────────────────────────────────────────────────
    let lastT = null;

    function frame(now) {
      requestAnimationFrame(frame);

      if (pMove) {
        if (drag) {
          orbs[drag.i].x = drag.ox + (pMove.x - drag.px);
          orbs[drag.i].y = drag.oy + (pMove.y - drag.py);
        }
        pMove = null;
      }

      const dt = lastT === null ? 0 : Math.min((now - lastT) / 1000, 0.05);
      lastT = now;
      const W = window.innerWidth, H = window.innerHeight;

      // physics
      for (let i = 0; i < orbs.length; i++) {
        const o = orbs[i];
        if (o.paused || (drag && drag.i === i)) continue;
        o.x += o.vx * dt; o.y += o.vy * dt;
        if (o.x - o.r < 0)   { o.x = o.r;     o.vx =  Math.abs(o.vx); }
        if (o.x + o.r > W)   { o.x = W - o.r; o.vx = -Math.abs(o.vx); }
        if (o.y - o.r < 0)   { o.y = o.r;     o.vy =  Math.abs(o.vy); }
        if (o.y + o.r > H)   { o.y = H - o.r; o.vy = -Math.abs(o.vy); }
      }
      for (let i = 0; i < orbs.length; i++) {
        for (let j = i + 1; j < orbs.length; j++) {
          const a = orbs[i], b = orbs[j];
          const dx = b.x - a.x, dy = b.y - a.y;
          const d = Math.sqrt(dx*dx + dy*dy), min = a.r + b.r;
          if (d < min && d > 0.01) {
            const ov = (min - d) / 2, nx = dx/d, ny = dy/d;
            if (!a.paused) { a.x -= nx*ov; a.y -= ny*ov; }
            if (!b.paused) { b.x += nx*ov; b.y += ny*ov; }
          }
        }
      }
      for (let i = 0; i < orbs.length; i++) {
        const o = orbs[i];
        orbEls[i].style.width  = o.r*2 + 'px';
        orbEls[i].style.height = o.r*2 + 'px';
        orbEls[i].style.transform = `translate(${Math.round(o.x-o.r)}px,${Math.round(o.y-o.r)}px)`;
      }

      // ── layout ────────────────────────────────────────────────────────────
      const G = W < 700 ? 16 : 52;
      const totalW = W - G * 2;

      // model rect — one getBoundingClientRect per frame
      const mvRect = mvWrap.getBoundingClientRect();
      const modelPadH = 28, modelPadV = 0;
      const modelObs = {
        x: mvRect.left  - modelPadH,
        y: mvRect.top   - modelPadV,
        w: mvRect.width + modelPadH * 2,
        h: mvRect.height + modelPadV * 2,
      };

      // orb obstacles (inline circle math)
      const circObs = orbs.map(o => ({ cx: o.x, cy: o.y, r: o.r }));

      // ── headline: left of model ──────────────────────────────────────────
      const leftColW  = Math.round(mvRect.left - G - 16);
      const hlMaxW    = Math.max(leftColW, 120);
      const hlFit     = fitHL2(hlMaxW, 80);
      const hlCenterY = Math.round(mvRect.top + mvRect.height * 0.28);
      const hlTotalH  = hlFit.lh * 2;
      const hlTop     = hlCenterY - hlTotalH / 2;
      const hl1 = { x: G, y: Math.round(hlTop),             text: HL_LINE1 };
      const hl2 = { x: G, y: Math.round(hlTop + hlFit.lh),  text: HL_LINE2 };

      // ── eyebrow: above headline ──────────────────────────────────────────
      const eyTop  = Math.round(hlTop - 28);
      const eyR    = layoutWithLines(prepEy, hlMaxW, 14);
      const eyLines = eyR.lines.map((l, i) => ({ x: G, y: eyTop + i * 16, text: l.text }));

      // ── body: full-width, flows around model + orbs ──────────────────────
      // Use the entire viewport height (skip header ~60px)
      const bodyTop = 68;
      const bodyH   = H - bodyTop - 16;
      const zero    = { segmentIndex: 0, graphemeIndex: 0 };
      const { lines: bodyLines } = layoutCol(
        prepBody, zero,
        G, bodyTop, totalW, bodyH,
        BODY_LH,
        circObs, [modelObs],
      );

      // ── accent strip: below model ────────────────────────────────────────
      const acTop = Math.round(mvRect.bottom + 14);
      const acLines = [];
      for (let qi = 0; qi < prepAc.length; qi++) {
        const r = layoutWithLines(prepAc[qi], totalW, 18);
        for (const l of r.lines) acLines.push({ x: G, y: acTop + qi * 22, text: l.text });
      }

      // ── commit ───────────────────────────────────────────────────────────
      sync(pools.hl,   2,               'div', 'txt-hl');
      sync(pools.body, bodyLines.length, 'div', 'txt-line');
      sync(pools.ey,   eyLines.length,  'div', 'txt-eyebrow');
      sync(pools.ac,   acLines.length,  'div', 'txt-accent');

      // headline — set manually, not via applyLines (different font per line could differ later)
      for (const [idx, ln] of [[0, hl1], [1, hl2]]) {
        const el = pools.hl[idx];
        el.textContent  = ln.text;
        el.style.left   = ln.x + 'px';
        el.style.top    = ln.y + 'px';
        el.style.font   = hlFit.font;
        el.style.lineHeight = hlFit.lh + 'px';
      }

      applyLines(pools.body, bodyLines, BODY_FONT, BODY_LH);
      applyLines(pools.ey,   eyLines,   EY_FONT,   14);
      applyLines(pools.ac,   acLines,   AC_FONT,   18);
    }

    requestAnimationFrame(frame);
  }
</script>
</body>
</html>
