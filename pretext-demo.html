<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D-Agent · Pretext Editorial Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    html, body {
      background: radial-gradient(ellipse at 50% 40%, #0d0f1a 0%, #070810 100%);
      color: #e2ddf5;
      height: 100vh;
      overflow: hidden;
    }
    body { font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, serif; }

    #stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    .line {
      position: absolute;
      white-space: pre;
      z-index: 1;
      color: #cdc8e8;
      pointer-events: none;
    }
    .headline-line {
      position: absolute;
      white-space: pre;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
      z-index: 2;
      pointer-events: none;
    }
    .drop-cap {
      position: absolute;
      font-weight: 700;
      color: #7c6fcf;
      pointer-events: none;
      z-index: 2;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      z-index: 10;
      will-change: transform;
    }
    .pullquote-line {
      position: absolute;
      white-space: pre;
      font-style: italic;
      color: #9d8fd6;
      z-index: 3;
      pointer-events: none;
    }
    .pullquote-bar {
      position: absolute;
      background: #4a3e8a;
      width: 3px;
      z-index: 3;
      pointer-events: none;
    }
    .hint {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      font: 400 13px/1 "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: rgba(255,255,255,0.22);
      z-index: 100;
      background: rgba(0,0,0,0.45);
      padding: 8px 18px;
      border-radius: 999px;
      pointer-events: none;
      white-space: nowrap;
    }
    #err {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: #c0392b;
      color: #fff;
      font: 13px monospace;
      padding: 12px;
      z-index: 9999;
      white-space: pre-wrap;
      display: none;
    }
    @media (max-width: 760px) { .hint { display: none; } }
  </style>
</head>
<body>
  <div id="err"></div>
  <div id="stage"></div>
  <div class="hint">Drag the orbs &middot; Click to pause &middot; Zero DOM reads</div>

  <script type="module">
    function showErr(e) {
      const el = document.getElementById('err');
      el.style.display = 'block';
      el.textContent = String(e?.stack || e);
    }
    window.addEventListener('error', e => showErr(e.error || e.message));
    window.addEventListener('unhandledrejection', e => showErr(e.reason));

    try {

    import('@chenglou/pretext').then(({
      layoutNextLine,
      layoutWithLines,
      prepareWithSegments,
      walkLineRanges,
    }) => {
      run({ layoutNextLine, layoutWithLines, prepareWithSegments, walkLineRanges });
    }).catch(showErr);

    } catch(e) { showErr(e); }

    function run({ layoutNextLine, layoutWithLines, prepareWithSegments, walkLineRanges }) {
      const BODY_FONT = '17px "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, serif';
      const BODY_LINE_HEIGHT = 28;
      const HL_FAMILY = '"Iowan Old Style", "Palatino Linotype", "Book Antiqua", Palatino, serif';
      const HL_TEXT = 'AUTONOMOUS AGENTS ARE THE NEW INTERFACE';
      const GUTTER = 48;
      const COL_GAP = 40;
      const DROP_LINES = 3;
      const MIN_SLOT = 50;

      const BODY = `The history of software interfaces is a history of shrinking distance between human intent and machine action. The command line required you to memorize incantations. The graphical interface gave you objects to click. The touchscreen made those objects physical. Each transition collapsed a layer of indirection, bringing the interface closer to thought itself.

Autonomous agents collapse the remaining distance. You do not click, type, or drag. You describe what you want, and the agent determines how to achieve it. The interface disappears entirely, replaced by a collaborator that understands context, maintains memory, and executes multi-step plans across heterogeneous systems.

On the Solana blockchain, this transformation is happening in real time. Agents are being deployed that can trade tokens, manage liquidity positions, respond to on-chain events, and coordinate with other agents — all without human intervention between steps. The latency of human decision-making is removed from the loop. The agent acts at the speed of the network.

What makes Solana uniquely suited to autonomous agents is the combination of finality speed, fee structure, and programmability. A transaction confirms in four hundred milliseconds. Fees are fractions of a cent. Programs can invoke other programs atomically, allowing agents to compose complex multi-step operations into a single transaction. Either everything succeeds, or nothing does.

The 3D-Agent platform extends this into the visual domain. Agents are not faceless processes running in a datacenter — they are embodied in three-dimensional characters that represent identity, personality, and current state. An agent managing a DeFi position might pace anxiously when its collateral ratio nears a threshold. An agent completing a successful arbitrage might celebrate. The visual representation is not decorative — it is a real-time signal that humans can parse at a glance, the same way a colleague's body language communicates before they say a word.

This matters because the transition to autonomous agents does not eliminate the human. It changes the human's role from operator to supervisor. Instead of executing actions, you observe agents, assess their behavior, and intervene when something deviates from your intent. The 3D representation is an interface optimized for this supervisory role — rich in signal, low in cognitive load, comprehensible in a glance.

The technical substrate is a combination of real-time 3D rendering, Solana's WebSocket RPC, and a model context protocol that allows language models to issue structured commands against on-chain programs. When an agent decides to act, it produces a typed action description. The action is validated against a schema, translated into Solana instructions, and submitted. The result flows back into the agent's context, updating its world model and informing the next decision.

Memory is the missing ingredient in most agent systems. An agent that forgets its previous actions cannot maintain a coherent strategy over time. The 3D-Agent memory system stores compressed episode summaries on Arweave, indexed by agent public key, with recency-weighted retrieval that surfaces relevant past experience when the agent faces analogous situations. The agent that traded a particular token six months ago and lost can retrieve that episode and adjust its strategy accordingly.

Coordination between agents is the frontier. Multiple agents acting in parallel, with shared goals and divided responsibilities, can achieve outcomes no single agent could. On Solana, this coordination can be made explicit and verifiable through on-chain programs that record inter-agent commitments, track task completion, and arbitrate disputes. The blockchain becomes the coordination layer for a society of agents.

The interface is not the command line, the GUI, the touchscreen, or the chat window. The interface is the agent itself, rendered in three dimensions, moving through a persistent space, leaving a trail of actions that a supervisor can audit and a memory system that allows it to learn. The distance between human intent and machine action has never been smaller. We are building the final layer.`;

      const PQ_FONT = `italic 17px ${HL_FAMILY}`;
      const PQ_LH = 26;
      const PULLQUOTES = [
        { text: '"An agent that forgets its previous actions cannot maintain a coherent strategy. Memory makes agents learnable — not from gradients, but from experience."', col: 0, yFrac: 0.44, wFrac: 0.52, side: 'right' },
        { text: '"The interface is not the chat window. The interface is the agent itself, rendered in three dimensions."', col: 1, yFrac: 0.28, wFrac: 0.50, side: 'left' },
      ];

      const ORB_DEFS = [
        { fx: 0.52, fy: 0.22, r: 105, vx: 22, vy: 15, rgb: [124,111,207] },
        { fx: 0.18, fy: 0.50, r: 80,  vx: -18, vy: 25, rgb: [70,130,240] },
        { fx: 0.75, fy: 0.60, r: 90,  vx: 15, vy: -20, rgb: [170,70,210] },
        { fx: 0.38, fy: 0.74, r: 70,  vx: -24, vy: -13, rgb: [50,175,195] },
        { fx: 0.88, fy: 0.18, r: 60,  vx: -12, vy: 18, rgb: [210,90,150] },
      ];

      // ── helpers ─────────────────────────────────────────────────────────
      function carveSlots(base, blocked) {
        let slots = [base];
        for (const b of blocked) {
          const next = [];
          for (const s of slots) {
            if (b.right <= s.left || b.left >= s.right) { next.push(s); continue; }
            if (b.left > s.left) next.push({ left: s.left, right: b.left });
            if (b.right < s.right) next.push({ left: b.right, right: s.right });
          }
          slots = next;
        }
        return slots.filter(s => s.right - s.left >= MIN_SLOT);
      }

      function circleInterval(cx, cy, r, top, bot, hPad, vPad) {
        const t = top - vPad, b = bot + vPad;
        if (t >= cy + r || b <= cy - r) return null;
        const minDy = cy >= t && cy <= b ? 0 : cy < t ? t - cy : cy - b;
        if (minDy >= r) return null;
        const dx = Math.sqrt(r * r - minDy * minDy);
        return { left: cx - dx - hPad, right: cx + dx + hPad };
      }

      // ── DOM setup ────────────────────────────────────────────────────────
      const stage = document.getElementById('stage');
      const W0 = window.innerWidth, H0 = window.innerHeight;

      function mkOrb([r,g,b]) {
        const el = document.createElement('div');
        el.className = 'orb';
        el.style.background = `radial-gradient(circle at 35% 35%, rgba(${r},${g},${b},0.35), rgba(${r},${g},${b},0.12) 55%, transparent 72%)`;
        el.style.boxShadow = `0 0 60px 15px rgba(${r},${g},${b},0.18), 0 0 120px 40px rgba(${r},${g},${b},0.07)`;
        el.style.cursor = 'grab';
        stage.appendChild(el);
        return el;
      }

      // ── prepare text ─────────────────────────────────────────────────────
      document.fonts.ready.then(() => {
        try { main(); } catch(e) { showErr(e); }
      });

      function main() {
        const prepBody = prepareWithSegments(BODY, BODY_FONT);
        const prepPQs = PULLQUOTES.map(q => prepareWithSegments(q.text, PQ_FONT));
        const DROP_SIZE = BODY_LINE_HEIGHT * DROP_LINES - 4;
        const DROP_FONT = `700 ${DROP_SIZE}px ${HL_FAMILY}`;
        const prepDrop = prepareWithSegments(BODY[0], DROP_FONT);

        let dropW = 0;
        walkLineRanges(prepDrop, 99999, ln => { dropW = ln.width; });
        const DROP_W = Math.ceil(dropW) + 10;

        const dropEl = document.createElement('div');
        dropEl.className = 'drop-cap';
        dropEl.textContent = BODY[0];
        dropEl.style.font = DROP_FONT;
        dropEl.style.lineHeight = `${DROP_SIZE}px`;
        stage.appendChild(dropEl);

        const orbEls = ORB_DEFS.map(d => mkOrb(d.rgb));
        const orbs = ORB_DEFS.map(d => ({
          x: d.fx * W0, y: d.fy * H0,
          r: d.r, vx: d.vx, vy: d.vy,
          paused: false,
        }));

        // ── headline fit cache ─────────────────────────────────────────────
        let hlCache = null;
        function fitHL(maxW, maxH) {
          if (hlCache && hlCache.maxW === maxW && hlCache.maxH === maxH) return hlCache;
          let lo = 16, hi = 88, best = lo, bestLines = [];
          while (lo <= hi) {
            const sz = (lo + hi) >> 1;
            const font = `700 ${sz}px ${HL_FAMILY}`;
            const lh = Math.round(sz * 0.93);
            const p = prepareWithSegments(HL_TEXT, font);
            let breaks = false, count = 0;
            walkLineRanges(p, maxW, ln => { count++; if (ln.end.graphemeIndex !== 0) breaks = true; });
            if (!breaks && count * lh <= maxH) {
              best = sz;
              const r = layoutWithLines(p, maxW, lh);
              bestLines = r.lines.map((l, i) => ({ x: 0, y: i * lh, text: l.text }));
              lo = sz + 1;
            } else {
              hi = sz - 1;
            }
          }
          hlCache = { maxW, maxH, sz: best, lh: Math.round(best * 0.93), lines: bestLines };
          return hlCache;
        }

        // ── layout column ─────────────────────────────────────────────────
        function layoutCol(prepared, startCursor, rX, rY, rW, rH, lh, circObs, rectObs) {
          let cursor = startCursor;
          let y = rY;
          const lines = [];
          let done = false;
          while (y + lh <= rY + rH && !done) {
            const blocked = [];
            for (const o of circObs) {
              const iv = circleInterval(o.cx, o.cy, o.r, y, y + lh, o.hPad, o.vPad);
              if (iv) blocked.push(iv);
            }
            for (const rect of rectObs) {
              if (y + lh <= rect.y || y >= rect.y + rect.h) continue;
              blocked.push({ left: rect.x, right: rect.x + rect.w });
            }
            const slots = carveSlots({ left: rX, right: rX + rW }, blocked);
            if (!slots.length) { y += lh; continue; }
            const ordered = slots.slice().sort((a, b) => a.left - b.left);
            for (const slot of ordered) {
              const ln = layoutNextLine(prepared, cursor, slot.right - slot.left);
              if (!ln) { done = true; break; }
              lines.push({ x: Math.round(slot.left), y: Math.round(y), text: ln.text });
              cursor = ln.end;
            }
            y += lh;
          }
          return { lines, cursor };
        }

        // ── element pools ──────────────────────────────────────────────────
        const pools = { hl: [], body: [], pq: [], pqBar: [] };

        function sync(pool, n, tag, cls) {
          while (pool.length < n) {
            const el = document.createElement(tag);
            el.className = cls;
            stage.appendChild(el);
            pool.push(el);
          }
          for (let i = 0; i < pool.length; i++) pool[i].style.display = i < n ? '' : 'none';
        }

        function applyLines(pool, lines, font, lh) {
          for (let i = 0; i < lines.length; i++) {
            const el = pool[i], ln = lines[i];
            el.textContent = ln.text;
            el.style.left = ln.x + 'px';
            el.style.top = ln.y + 'px';
            el.style.font = font;
            el.style.lineHeight = lh + 'px';
          }
        }

        // ── drag / pointer ─────────────────────────────────────────────────
        let drag = null, lastT = null;
        let pDown = null, pMove = null, pUp = null;

        stage.addEventListener('pointerdown', e => {
          pDown = { x: e.clientX, y: e.clientY };
          const hit = hitOrb(e.clientX, e.clientY);
          if (hit >= 0) {
            drag = { i: hit, ox: orbs[hit].x, oy: orbs[hit].y, px: e.clientX, py: e.clientY };
            orbs[hit].paused = true;
            e.preventDefault();
          }
        });
        window.addEventListener('pointermove', e => { pMove = { x: e.clientX, y: e.clientY }; });
        window.addEventListener('pointerup', e => {
          pUp = { x: e.clientX, y: e.clientY };
          if (drag) {
            orbs[drag.i].paused = false;
            const elapsed = lastT ? 0.016 : 0;
            orbs[drag.i].vx = (e.clientX - drag.px) * 5;
            orbs[drag.i].vy = (e.clientY - drag.py) * 5;
            drag = null;
          }
        });

        function hitOrb(px, py) {
          for (let i = orbs.length - 1; i >= 0; i--) {
            const o = orbs[i];
            const dx = px - o.x, dy = py - o.y;
            if (dx * dx + dy * dy <= o.r * o.r * 1.1) return i;
          }
          return -1;
        }

        // ── render loop ────────────────────────────────────────────────────
        function frame(now) {
          requestAnimationFrame(frame);

          // pointer
          if (pMove) {
            if (drag) {
              orbs[drag.i].x = drag.ox + (pMove.x - drag.px);
              orbs[drag.i].y = drag.oy + (pMove.y - drag.py);
            }
            pMove = null;
          }
          if (pDown) {
            const hit = hitOrb(pDown.x, pDown.y);
            if (hit >= 0 && !drag) orbs[hit].paused = !orbs[hit].paused;
            pDown = null;
          }
          if (pUp) pUp = null;

          // physics
          const dt = lastT === null ? 0 : Math.min((now - lastT) / 1000, 0.05);
          lastT = now;
          const W = window.innerWidth, H = window.innerHeight;

          for (let i = 0; i < orbs.length; i++) {
            const o = orbs[i];
            if (o.paused || (drag && drag.i === i)) continue;
            o.x += o.vx * dt; o.y += o.vy * dt;
            if (o.x - o.r < 0)   { o.x = o.r;     o.vx =  Math.abs(o.vx); }
            if (o.x + o.r > W)   { o.x = W - o.r; o.vx = -Math.abs(o.vx); }
            if (o.y - o.r < 0)   { o.y = o.r;     o.vy =  Math.abs(o.vy); }
            if (o.y + o.r > H)   { o.y = H - o.r; o.vy = -Math.abs(o.vy); }
          }
          // orb-orb separation
          for (let i = 0; i < orbs.length; i++) {
            for (let j = i + 1; j < orbs.length; j++) {
              const a = orbs[i], b = orbs[j];
              const dx = b.x - a.x, dy = b.y - a.y;
              const d = Math.sqrt(dx*dx + dy*dy);
              const min = a.r + b.r;
              if (d < min && d > 0.01) {
                const ov = (min - d) / 2, nx = dx/d, ny = dy/d;
                if (!a.paused) { a.x -= nx*ov; a.y -= ny*ov; }
                if (!b.paused) { b.x += nx*ov; b.y += ny*ov; }
                if (!a.paused && !b.paused) {
                  const dot = (a.vx-b.vx)*nx + (a.vy-b.vy)*ny;
                  if (dot > 0) { a.vx -= dot*nx; a.vy -= dot*ny; b.vx += dot*nx; b.vy += dot*ny; }
                }
              }
            }
          }

          // update orb DOM
          for (let i = 0; i < orbs.length; i++) {
            const o = orbs[i];
            const el = orbEls[i];
            const d = o.r * 2;
            el.style.width = d + 'px';
            el.style.height = d + 'px';
            el.style.transform = `translate(${Math.round(o.x - o.r)}px,${Math.round(o.y - o.r)}px)`;
          }

          // layout
          const gutter = W < 760 ? 20 : GUTTER;
          const gap = W < 760 ? 20 : COL_GAP;
          const totalW = W - gutter * 2;
          const colW = (totalW - gap) / 2;

          // headline
          const hlFit = fitHL(totalW, H * 0.12);
          const hlTop = gutter;
          const hlFont = `700 ${hlFit.sz}px ${HL_FAMILY}`;
          const hlH = hlFit.lines.length * hlFit.lh;

          // body region
          const bTop = hlTop + hlH + 20;
          const bH = H - bTop - 20;

          // circle obstacles
          const circObs = orbs.map(o => ({ cx: o.x, cy: o.y, r: o.r, hPad: 12, vPad: 4 }));

          // pullquote rects
          const pqRects = [];
          const pqLineData = [];
          for (let qi = 0; qi < PULLQUOTES.length; qi++) {
            const q = PULLQUOTES[qi];
            const colX = q.col === 0 ? gutter : gutter + colW + gap;
            const pqW = Math.round(colW * q.wFrac);
            const pqX = q.side === 'left' ? colX : colX + colW - pqW;
            const pqY = Math.round(bTop + bH * q.yFrac);
            const r = layoutWithLines(prepPQs[qi], pqW - 16, PQ_LH);
            const pqH = r.lines.length * PQ_LH + 8;
            pqRects.push({ x: pqX - 3, y: pqY, w: pqW + 3, h: pqH, col: q.col, pqX, pqY, pqW, pqH });
            for (let li = 0; li < r.lines.length; li++) {
              pqLineData.push({ x: pqX + 16, y: pqY + li * PQ_LH, text: r.lines[li].text });
            }
          }

          // drop cap position
          const dcX = gutter, dcY = bTop;
          dropEl.style.left = dcX + 'px';
          dropEl.style.top = dcY + 'px';

          // col 0 obstacles: drop cap + col-0 pullquotes
          const obs0 = pqRects.filter(r => r.col === 0).map(r => ({ x: r.x, y: r.y, w: r.w, h: r.h }));
          obs0.push({ x: dcX, y: dcY, w: DROP_W, h: BODY_LINE_HEIGHT * DROP_LINES });

          const obs1 = pqRects.filter(r => r.col === 1).map(r => ({ x: r.x, y: r.y, w: r.w, h: r.h }));

          const zero = { segmentIndex: 0, graphemeIndex: 0 };
          const { lines: c0, cursor: c1start } = layoutCol(prepBody, zero, gutter, bTop, colW, bH, BODY_LINE_HEIGHT, circObs, obs0);
          const { lines: c1 } = layoutCol(prepBody, c1start, gutter + colW + gap, bTop, colW, bH, BODY_LINE_HEIGHT, circObs, obs1);
          const bodyLines = [...c0, ...c1];

          // render headline
          sync(pools.hl, hlFit.lines.length, 'span', 'headline-line');
          applyLines(pools.hl, hlFit.lines.map(l => ({ ...l, x: l.x + gutter, y: l.y + hlTop })), hlFont, hlFit.lh);

          // render body
          sync(pools.body, bodyLines.length, 'span', 'line');
          applyLines(pools.body, bodyLines, BODY_FONT, BODY_LINE_HEIGHT);

          // render pullquotes
          sync(pools.pq, pqLineData.length, 'span', 'pullquote-line');
          applyLines(pools.pq, pqLineData, PQ_FONT, PQ_LH);

          // pullquote bars (left-border visual)
          sync(pools.pqBar, pqRects.length, 'div', 'pullquote-bar');
          for (let i = 0; i < pqRects.length; i++) {
            const el = pools.pqBar[i], r = pqRects[i];
            el.style.left = r.pqX + 'px';
            el.style.top = r.pqY + 'px';
            el.style.height = r.pqH + 'px';
          }
        }

        requestAnimationFrame(frame);
      } // end main()
    } // end run()
  </script>
</body>
</html>
