apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: xspace-agent-server
  namespace: xspace-agent
  labels:
    app: xspace-agent
    component: server
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: xspace-agent-server

  minReplicas: 3
  maxReplicas: 20

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60  # Scale out when average CPU > 60%

    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75  # Scale out when average memory > 75%

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60   # Wait 60s before scaling up again
      policies:
        - type: Pods
          value: 3                      # Add at most 3 pods at a time
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300  # Wait 5 min before scaling down
      policies:
        - type: Pods
          value: 1                      # Remove at most 1 pod at a time
          periodSeconds: 60
